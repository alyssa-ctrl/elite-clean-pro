[build]
  command = "npm run build"
  publish = "_site"

# Preserve old .html-style URLs for SEO continuity (any existing
# inbound links to /residential.html still work)
[[redirects]]
  from = "/residential.html"
  to = "/residential/"
  status = 301

[[redirects]]
  from = "/commercial.html"
  to = "/commercial/"
  status = 301

